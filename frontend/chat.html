<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChatApp</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">

    <!-- Server icon bar -->
    <div class="server-bar">
      <div class="server-icon active">C</div>
      <div class="server-divider"></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="server-name">
        💬 ChatApp <span>⌄</span>
      </div>

      <div class="channels-list">
        <div class="channel-section">
          TEXT CHANNELS <span>+</span>
        </div>
        <div class="channel-item" onclick="joinRoom('general', this)"># <span>general</span></div>
        <div class="channel-item" onclick="joinRoom('engineering', this)"># <span>engineering</span></div>
        <div class="channel-item" onclick="joinRoom('random', this)"># <span>random</span></div>
        <div class="channel-item" onclick="joinRoom('announcements', this)"># <span>announcements</span></div>
      </div>

      <div class="user-bar">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-details">
          <div class="uname" id="display-username">...</div>
          <div class="urole" id="display-role">...</div>
        </div>
        <div class="user-icons">
          <button class="icon-btn" onclick="logout()" title="Logout">🚪</button>
        </div>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-area">
      <div class="chat-header">
        <span class="hash">#</span>
        <span class="room-title" id="room-title">Select a room</span>
        <div class="header-divider"></div>
        <span class="topic" id="room-topic">Pick a channel from the left to start chatting</span>
      </div>

      <div class="messages" id="messages">
        <div class="empty-state">👈 Select a room to start chatting</div>
      </div>

      <div class="input-area">
        <div class="input-box">
          <span class="input-icon">➕</span>
          <input type="text" id="msg-input" placeholder="Select a room first..." disabled />
          <span class="input-icon">😊</span>
        </div>
      </div>
    </div>

    <!-- Members panel -->
    <div class="members-panel" id="members-panel">
      <div class="members-section">MEMBERS</div>
      <div style="padding: 16px; color: #4e5058; font-size: 13px;">
        Join a room to see members
      </div>
    </div>

  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
