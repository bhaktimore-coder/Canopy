<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canopy</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f0f7f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      display: flex;
      width: 900px;
      min-height: 580px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(60, 100, 60, 0.13);
    }

    .illustration-side {
      width: 45%;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .illustration-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .illustration-overlay {
      position: absolute;
      inset: 0;
      background: rgba(30, 80, 30, 0.18);
    }

    .illustration-label {
      position: absolute;
      bottom: 32px;
      left: 28px;
      right: 28px;
    }

    .illustration-label h2 {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.25);
      line-height: 1.2;
    }

    .illustration-label p {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      margin-top: 6px;
      font-weight: 500;
      text-shadow: 0 1px 6px rgba(0,0,0,0.2);
    }

    .form-side {
      flex: 1;
      background: #f5f9f5;
      padding: 44px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .form-header h1 {
      font-size: 22px;
      font-weight: 800;
      color: #1a3d1a;
      letter-spacing: -0.3px;
    }

    .form-header p {
      font-size: 13px;
      color: #7a9e7a;
      margin-top: 4px;
      font-weight: 500;
    }

    .tab-row {
      display: flex;
      background: #e4f0e4;
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
    }

    .tab {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: #7a9e7a;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all .2s;
    }

    .tab.active {
      background: #ffffff;
      color: #2d6a2d;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .form-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 11px;
      font-weight: 700;
      color: #5a845a;
      letter-spacing: .7px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 11px;
      font-size: 14px;
      pointer-events: none;
    }

    input, select {
      width: 100%;
      padding: 10px 12px 10px 34px;
      border-radius: 10px;
      border: 1.5px solid #c8e0c8;
      background: #ffffff;
      color: #1a3d1a;
      font-size: 13px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      transition: border-color .2s;
    }

    input:focus, select:focus {
      border-color: #4a9e4a;
      box-shadow: 0 0 0 3px rgba(74,158,74,0.10);
    }

    input::placeholder { color: #aecbae; }
    select { cursor: pointer; }
    select option { background: #fff; color: #1a3d1a; }

    .btn-primary {
      padding: 12px;
      background: #3a8a3a;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      transition: background .2s, transform .1s;
      letter-spacing: .2px;
      margin-top: 2px;
    }

    .btn-primary:hover  { background: #2d6e2d; }
    .btn-primary:active { transform: scale(0.98); }

    .error-msg {
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      font-weight: 500;
    }

    .footer-note {
      text-align: center;
      font-size: 11px;
      color: #aecbae;
    }

    @media (max-width: 700px) {
      .page { width: 100%; min-height: 100vh; flex-direction: column; border-radius: 0; }
      .illustration-side { width: 100%; height: 220px; }
      .form-side { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <div class="page">

    <!-- LEFT — tree illustration -->
    <div class="illustration-side">
      <img src="download.jpg" alt="Canopy illustration" />
      <div class="illustration-overlay"></div>
      <div class="illustration-label">
        <h2>Welcome to<br/>Canopy 🌿</h2>
        <p>Where every branch connects</p>
      </div>
    </div>

    <!-- RIGHT — form -->
    <div class="form-side">

      <div class="form-header">
        <h1>Hello! Welcome Aboard 👋</h1>
        <p>We are glad to see you here</p>
      </div>

      <div class="tab-row">
        <button class="tab active" onclick="showTab('login', this)">Sign In</button>
        <button class="tab" onclick="showTab('register', this)">Register</button>
      </div>

      <!-- Login form -->
      <div class="form-body" id="login-form">
        <div class="form-group">
          <label>USERNAME</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="login-username" placeholder="Enter your username" />
          </div>
        </div>
        <div class="form-group">
          <label>PASSWORD</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="login-password" placeholder="Enter your password" />
          </div>
        </div>
        <button class="btn-primary" onclick="login()">Sign In →</button>
      </div>

      <!-- Register form -->
      <div class="form-body" id="register-form" style="display:none">
        <div class="form-group">
          <label>USERNAME</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="reg-username" placeholder="Choose a username" />
          </div>
        </div>
        <div class="form-group">
          <label>PASSWORD</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="reg-password" placeholder="Choose a password" />
          </div>
        </div>
        <div class="form-group">
          <label>ROLE</label>
          <div class="input-wrap">
            <span class="input-icon">🏷️</span>
            <select id="reg-role">
              <option value="member">Member</option>
              <option value="moderator">Moderator</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>
        <button class="btn-primary" onclick="register()">Create Account →</button>
      </div>

      <p class="error-msg" id="error-msg"></p>
      <p class="footer-note">Canopy • Internal use only</p>

    </div>
  </div>

  <script>
    function showTab(tab, btn) {
      document.getElementById('login-form').style.display    = tab === 'login'    ? 'flex' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'flex' : 'none';
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
    }

    async function login() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value.trim();
      if (!username || !password) return showError('Please fill in all fields');

      try {
        const res  = await fetch('https://canopy-dmv8.onrender.com/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.token) {
          localStorage.setItem('token',    data.token);
          localStorage.setItem('username', data.user.username);
          localStorage.setItem('role',     data.user.role);
          window.location.href = 'chat.html';
        } else {
          showError(data.error || 'Login failed');
        }
      } catch {
        showError('Cannot connect to server. Is the backend running?');
      }
    }

    async function register() {
      const username = document.getElementById('reg-username').value.trim();
      const password = document.getElementById('reg-password').value.trim();
      const role     = document.getElementById('reg-role').value;
      if (!username || !password) return showError('Please fill in all fields');

      try {
        const res  = await fetch('https://canopy-dmv8.onrender.com/auth/register', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password, role })
        });
        const data = await res.json();
        if (data.username) {
          showSuccess('Account created! Please sign in 🌿');
          showTab('login', document.querySelector('.tab'));
        } else {
          showError(data.error || 'Registration failed');
        }
      } catch {
        showError('Cannot connect to server. Is the backend running?');
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.style.color = '#d05050';
      el.textContent = msg;
    }

    function showSuccess(msg) {
      const el = document.getElementById('error-msg');
      el.style.color = '#3a8a3a';
      el.textContent = msg;
    }
  </script>

</body>
</html>
